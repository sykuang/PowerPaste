name: Build Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release'
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List build artifacts
        run: |
          echo "=== DMG files ==="
          ls -la src-tauri/target/release/bundle/dmg/ || true
          echo "=== App bundle ==="
          ls -la src-tauri/target/release/bundle/macos/ || true

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: PowerPaste-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: PowerPaste-macos-app
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List build artifacts
        run: |
          echo "=== MSI files ==="
          Get-ChildItem -Path src-tauri/target/release/bundle/msi/ -ErrorAction SilentlyContinue
          echo "=== NSIS files ==="
          Get-ChildItem -Path src-tauri/target/release/bundle/nsis/ -ErrorAction SilentlyContinue

      - name: Upload MSI Installer
        uses: actions/upload-artifact@v4
        with:
          name: PowerPaste-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: PowerPaste-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # Create GitHub release when a tag is pushed
  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | head -50

      - name: Get version from tag
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="dev-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: PowerPaste ${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: |
            artifacts/PowerPaste-macos-dmg/*.dmg
            artifacts/PowerPaste-windows-msi/*.msi
            artifacts/PowerPaste-windows-nsis/*.exe
          body: |
            ## PowerPaste ${{ steps.get_version.outputs.version }}

            ### Downloads
            - **macOS**: Download the `.dmg` file, open it, and drag PowerPaste to Applications
            - **Windows**: Download the `.msi` (recommended) or `.exe` installer

            ### macOS Gatekeeper Notice
            This DMG is not notarized by Apple. macOS will block it by default. To open:
            1. **Right-click** (or Control-click) the app and select **Open**
            2. Click **Open** in the confirmation dialog
            3. Alternatively, run: `xattr -cr /Applications/PowerPaste.app`

            ### What's Changed
            <!-- Release notes will be added here -->

            ---
            *Built automatically from commit ${{ github.sha }}*
