# E2E Tests Workflow
#
# Runs Appium native UI tests on macOS and Windows.
#
# DISABLED for automatic runs due to CI reliability issues:
# - macOS: WebDriverAgentMac build + session creation timeouts
# - Windows: Appium server startup race conditions
# - Complex test infrastructure with multiple failure points
#
# Run manually via workflow_dispatch when needed.

name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'Number of parallel test workers'
        required: false
        default: '2'
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # macOS Appium tests (native UI)
  test-appium-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Install Appium and Mac2 driver
        run: |
          npm install -g appium
          appium driver install mac2

      - name: Enable automation mode (for CI)
        run: |
          # Allow automation without authentication
          sudo automationmodetool enable-automationmode-without-authentication || true

      - name: Pre-grant Accessibility permissions
        run: |
          # Reset and grant permissions for testing
          tccutil reset Accessibility com.primattek.powerpaste || true
          # Note: Granting requires SIP disabled or MDM profile in real CI
          # For now, tests will need to handle permission prompts

      - name: Start Appium server
        run: appium --relaxed-security &

      - name: Wait for Appium
        run: sleep 5

      - name: Run Appium tests
        run: npm run test:e2e:mac
        env:
          POWERPASTE_TEST_WORKERS: ${{ github.event.inputs.workers || '2' }}

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-macos-results
          path: |
            reports/appium/mac/
            reports/screenshots/
          retention-days: 7

  # macOS Permission dialog test (separate job, no pre-grant)
  test-permissions-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Install Appium and Mac2 driver
        run: |
          npm install -g appium
          appium driver install mac2

      - name: Enable automation mode
        run: |
          sudo automationmodetool enable-automationmode-without-authentication || true

      - name: Reset permissions (for permission flow testing)
        run: |
          tccutil reset Accessibility com.primattek.powerpaste || true
          tccutil reset AppleEvents com.primattek.powerpaste || true

      - name: Start Appium server
        run: appium --relaxed-security &

      - name: Wait for Appium
        run: sleep 5

      - name: Run permission dialog tests
        run: npm run test:e2e:mac:permissions
        env:
          POWERPASTE_TEST_WORKERS: '1'  # Sequential for permission tests

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: permissions-macos-results
          path: |
            reports/appium/mac/
            reports/screenshots/
          retention-days: 7

  # Windows Appium tests (native UI)
  test-appium-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Install Appium and Windows driver
        run: |
          npm install -g appium
          appium driver install windows
          appium driver run windows install-wad
        shell: pwsh

      - name: Enable Developer Mode
        run: |
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /f /v "AllowDevelopmentWithoutDevLicense" /d "1"
        shell: pwsh

      - name: Start Appium server
        run: Start-Process appium -ArgumentList "--relaxed-security"
        shell: pwsh

      - name: Wait for Appium
        run: Start-Sleep -Seconds 5
        shell: pwsh

      - name: Run Appium tests
        run: npm run test:e2e:windows
        env:
          POWERPASTE_TEST_WORKERS: ${{ github.event.inputs.workers || '2' }}

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-windows-results
          path: |
            reports/appium/windows/
            reports/screenshots/
          retention-days: 7

  # Summary job
  test-summary:
    needs:
      - test-appium-macos
      - test-permissions-macos
      - test-appium-windows
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "## E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Appium macOS | ${{ needs.test-appium-macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Permissions macOS | ${{ needs.test-permissions-macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Appium Windows | ${{ needs.test-appium-windows.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any test failed
        if: |
          needs.test-appium-macos.result == 'failure' ||
          needs.test-appium-windows.result == 'failure'
        run: exit 1
